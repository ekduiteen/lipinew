# ============================================================================
# LIPI — Full stack
# Single L40S | Qwen2.5-14B-Instruct-AWQ | faster-whisper | OmniVoice
# ============================================================================

services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lipi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000
      NEXT_PUBLIC_AUTH_ORIGIN: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    networks:
      - lipi-net
    depends_on:
      backend:
        condition: service_healthy

  # ─── NOTE: Caddy is for production only ───────────────────────────────────
  # For local development, frontend runs on localhost:3000 via npm run dev
  #
  # caddy:
  #   image: caddy:2.8-alpine
  #   container_name: lipi-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "443:443/udp"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   environment:
  #     CADDY_DOMAIN: ${CADDY_DOMAIN}
  #     CADDY_EMAIL: ${CADDY_EMAIL}
  #   networks:
  #     - lipi-net
  #   depends_on:
  #     - backend

  # ─── Backend: FastAPI ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lipi-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VALKEY_URL: ${VALKEY_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_AUDIO: ${MINIO_BUCKET_AUDIO}
      MINIO_BUCKET_TTS: ${MINIO_BUCKET_TTS}
      VLLM_URL: ${VLLM_URL}
      VLLM_MODEL: ${VLLM_MODEL}
      VLLM_TIMEOUT: ${VLLM_TIMEOUT}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ENABLE_API_FALLBACK: ${ENABLE_API_FALLBACK}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_URL: ${APP_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      ENVIRONMENT: ${ENVIRONMENT}
    networks:
      - lipi-net
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── NOTE: ML Service (STT + TTS) runs on REMOTE server only ───────────────
  # Connect via SSH tunnel: ssh -L 5001:localhost:5001 ...
  # Set ML_SERVICE_URL=http://localhost:5001 in .env
  #
  # ml:
  #   build:
  #     context: ./ml
  #     dockerfile: Dockerfile
  #   container_name: lipi-ml
  #   restart: unless-stopped
  #   environment:
  #     STT_DEVICE: cuda:0
  #     TTS_DEVICE: cuda:1
  #     LOG_LEVEL: ${LOG_LEVEL}
  #   volumes:
  #     - ml_models:/app/models
  #   networks:
  #     - lipi-net
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids: ["0", "1"]
  #             capabilities: [gpu]

  # ─── NOTE: vLLM (LLM inference) runs on REMOTE server only ─────────────────
  # Remote command:
  #   python -m vllm.entrypoints.openai.api_server \
  #     --model Qwen/Qwen2.5-14B-Instruct-AWQ \
  #     --dtype auto --gpu-memory-utilization 0.85 \
  #     --port 8100 --enable-prefix-caching --max-model-len 8192 \
  #     --served-model-name lipi
  #
  # Connect via SSH tunnel: ssh -L 8100:localhost:8100 ...
  # Set VLLM_URL=http://localhost:8100 in .env
  #
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: lipi-vllm
  #   restart: unless-stopped
  #   ipc: host
  #   environment:
  #     HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
  #   volumes:
  #     - vllm_models:/root/.cache/huggingface
  #   command: >
  #     --model Qwen/Qwen2.5-14B-Instruct-AWQ
  #     --dtype auto
  #     --gpu-memory-utilization 0.85
  #     --port 8100
  #     --enable-prefix-caching
  #     --max-model-len 8192
  #     --served-model-name lipi
  #   networks:
  #     - lipi-net
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids: ["0"]
  #             capabilities: [gpu]

  # ─── PostgreSQL 16 with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lipi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lipi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Valkey (BSD-3 Redis fork) for cache + queues ─────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    container_name: lipi-valkey
    restart: unless-stopped
    command: valkey-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    networks:
      - lipi-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO: S3-compatible object storage ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lipi-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lipi-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MinIO bucket initialization ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: lipi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - lipi-net
    entrypoint: >
      /bin/sh -c "
      mc alias set lipi http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb -p lipi/${MINIO_BUCKET_AUDIO} || true;
      mc mb -p lipi/${MINIO_BUCKET_TTS} || true;
      mc mb -p lipi/${MINIO_BUCKET_ARCHIVES} || true;
      mc anonymous set download lipi/${MINIO_BUCKET_TTS};
      exit 0;
      "

  # ─── Prometheus: metrics collection ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: lipi-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - lipi-net
    profiles:
      - monitoring

  # ─── Grafana: dashboards ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: lipi-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - lipi-net
    profiles:
      - monitoring

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  lipi-net:
    driver: bridge

# ─── Persistent volumes ─────────────────────────────────────────────────────
volumes:
  postgres_data:
  valkey_data:
  minio_data:
  # vllm_models and ml_models run on REMOTE server only
  # caddy_data and caddy_config used only in production
  prometheus_data:
  grafana_data:
